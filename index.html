<style>
  :root {
    --paper: #F5F1EA;
    --paper-2: #EDE7DC;
    --paper-3: #E4DDCE;
    --ink: #1A1815;
    --ink-2: #4A453C;
    --ink-3: #8A8275;
    --ink-4: #B5AC9C;
    --rule: #D9D2C5;
    --accent: #B8533A;
    --accent-soft: #E8C3B5;
    --accent-bg: #F4E2DA;
    --good: #5A6B3E;
    /* Inverse surfaces (the focus card, primary buttons) stay dark in both themes. */
    --surface-dark: #1A1815;
    --on-dark: #F5F1EA;
    --on-dark-2: #B5AC9C;
    --tabbar-bg: rgba(245,241,234,0.92);
    --page-bg: #d6cfc2;
    --page-grad: radial-gradient(circle at 30% 20%, #e0d9cb, #c8c0b1);
    --serif: "Instrument Serif", "Times New Roman", serif;
    --sans: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: "Geist Mono", ui-monospace, monospace;
  }
  html[data-theme="dark"] {
    --paper: #1B1A17;
    --paper-2: #232220;
    --paper-3: #2C2A26;
    --ink: #ECE6DA;
    --ink-2: #C3BCAD;
    --ink-3: #8A8275;
    --ink-4: #5F5A50;
    --rule: #322F2A;
    --good: #8DA068;
    --surface-dark: #2A2824;
    --on-dark: #F2ECE0;
    --on-dark-2: #B5AC9C;
    --tabbar-bg: rgba(20,19,16,0.92);
    --page-bg: #0f0e0c;
    --page-grad: radial-gradient(circle at 30% 20%, #1a1815, #0c0b0a);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--page-bg);
    font-family: var(--sans);
    color: var(--ink);
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: var(--page-grad);
  }
  #root {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .frame {
    width: 100%;
    height: 100%;
    max-width: 440px;
    max-height: 920px;
    background: var(--paper);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    border-radius: 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.05);
  }
  @media (max-width: 500px), (max-height: 700px) {
    .frame { border-radius: 0; max-width: none; max-height: none; box-shadow: none; }
  }
  .frame::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.025) 1px, transparent 0);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }
  /* iOS-style scrollbar hidden */
  .scroll::-webkit-scrollbar { display: none; }
  .scroll { scrollbar-width: none; }

  /* button reset */
  button { font: inherit; cursor: pointer; }
  input, textarea { font: inherit; }

  /* Accessibility: a visible keyboard-focus ring (only for keyboard users, via
     :focus-visible — pointer taps stay clean). Uses the live accent colour. */
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* status bar mock */
  .statusbar {
    display: flex; justify-content: space-between; align-items: center;
    /* Reserve room for the (transparent, edge-to-edge) system status bar. */
    padding: calc(14px + env(safe-area-inset-top)) 24px 0;
    font-family: var(--mono); font-size: 12px;
    color: var(--ink-2);
    position: relative; z-index: 2;
    flex-shrink: 0;
  }

  /* tap feedback */
  .tap { transition: transform 0.08s ease, opacity 0.12s; }
  .tap:active { transform: scale(0.97); opacity: 0.85; }

  /* sheet animations */
  @keyframes sheetIn {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @keyframes sheetCenterIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  .om-sheet-card::-webkit-scrollbar { display: none; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Tab content settle — a quiet "page turn" when switching tabs. */
  @keyframes tabIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* Habit cell completion: the tide "fills in" with a short ripple + scale. */
  @keyframes tideFill {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes tideRipple {
    from { transform: scale(0.4); opacity: 0.5; }
    to   { transform: scale(2.4); opacity: 0; }
  }
  /* Empty-state starters drift in gently. */
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* Pip swoops in from off-screen with a couple of wing-flap wobbles, then
     settles with a small bump. */
  @keyframes parrotIn {
    0%   { opacity: 0; transform: translateX(150px) translateY(-16px) rotate(18deg) scale(0.88); }
    45%  { opacity: 1; transform: translateX(-16px) translateY(7px)  rotate(-9deg) scale(1.05); }
    68%  { transform: translateX(8px)  translateY(-4px) rotate(5deg)  scale(0.98); }
    86%  { transform: translateX(-3px) translateY(1px)  rotate(-2deg) scale(1.01); }
    100% { opacity: 1; transform: translateX(0) translateY(0) rotate(0) scale(1); }
  }
  /* Flung across to the next tab (swiped right): lean into the travel, stretch
     like he's racing the screen, then squash on arrival — the "bump the wall". */
  @keyframes parrotFlyRight {
    0%   { transform: rotate(0) scale(1); }
    22%  { transform: translateY(-12px) rotate(15deg) scale(1.1, 0.9); }
    55%  { transform: translateY(-6px)  rotate(16deg) scale(1.06, 0.95); }
    76%  { transform: translateY(0)     rotate(-7deg) scale(0.9, 1.1); }
    90%  { transform: rotate(3deg) scale(1.02, 0.98); }
    100% { transform: rotate(0) scale(1); }
  }
  @keyframes parrotFlyLeft {
    0%   { transform: rotate(0) scale(1); }
    22%  { transform: translateY(-12px) rotate(-15deg) scale(1.1, 0.9); }
    55%  { transform: translateY(-6px)  rotate(-16deg) scale(1.06, 0.95); }
    76%  { transform: translateY(0)     rotate(7deg)   scale(0.9, 1.1); }
    90%  { transform: rotate(-3deg) scale(1.02, 0.98); }
    100% { transform: rotate(0) scale(1); }
  }
  /* Idle hover — Pip bobs gently in place with a subtle tilt so he feels alive. */
  @keyframes parrotFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-5px) rotate(-2.5deg); }
  }
  /* A happy, springy hop when you finish something. */
  @keyframes parrotHop {
    0%   { transform: translateY(0) rotate(0) scale(1); }
    20%  { transform: translateY(-17px) rotate(-10deg) scale(1.06); }
    45%  { transform: translateY(0) rotate(0) scale(0.97); }
    65%  { transform: translateY(-9px) rotate(8deg) scale(1.03); }
    85%  { transform: translateY(0) rotate(-2deg) scale(1); }
    100% { transform: translateY(0) rotate(0) scale(1); }
  }
  /* Riding the wave on the Marés tab: a buoyant vertical bob. The bird and the
     wave share this wrapper so they rise and fall together (Pip stays on the
     crest); the bird's own lean comes from parrotTilt. */
  @keyframes parrotSurf {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }
  /* Surfing lean — a rotate only, so Pip tilts on the board without lifting off
     the wave. */
  @keyframes parrotTilt {
    0%, 100% { transform: rotate(-6deg); }
    50%      { transform: rotate(6deg); }
  }
  /* Slow horizontal drift so Pip surfs along the bottom. */
  @keyframes parrotDrift {
    0%, 100% { transform: translateX(-34px); }
    50%      { transform: translateX(34px); }
  }
  /* Speech bubble pops in. */
  @keyframes bubblePop {
    0%   { opacity: 0; transform: scale(0.85) translateY(6px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Pip's motion lives in classes (not inline) so it can survive reduce-motion —
     see the exemption below. */
  .pip-in    { animation: parrotIn 0.85s cubic-bezier(0.22,1,0.36,1) both; }
  .pip-fly-l { animation: parrotFlyLeft 0.9s cubic-bezier(0.34,1.4,0.5,1) both; }
  .pip-fly-r { animation: parrotFlyRight 0.9s cubic-bezier(0.34,1.4,0.5,1) both; }
  .pip-float { animation: parrotFloat 4.5s ease-in-out infinite; }
  .pip-tilt  { animation: parrotTilt 3s ease-in-out infinite; }
  .pip-hop   { animation: parrotHop 0.7s ease; }
  .pip-drift { animation: parrotDrift 6s ease-in-out infinite; }
  .pip-surf  { animation: parrotSurf 2.8s ease-in-out infinite; }
  .pip-pop   { animation: bubblePop 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
  /* The "fly to" between tabs: snappy with an overshoot so he bumps the wall. */
  .pip-move  { transition: top 0.8s cubic-bezier(0.34,1.32,0.64,1), left 0.8s cubic-bezier(0.34,1.32,0.64,1); }

  /* Honour the user's (or OS's) reduce-motion preference: kill all animation.
     The attribute is set on <html> by app.jsx from prefs.reducedMotion, which
     itself defaults from prefers-reduced-motion. */
  html[data-reduced-motion="true"] *,
  html[data-reduced-motion="true"] *::before,
  html[data-reduced-motion="true"] *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
  /* …except Pip. He's an explicit opt-in mascot (Definições → Papagaio ajudante),
     and his whole point is to fly around — so his own motion stays alive even
     under reduce-motion. Turn the parrot off to silence him entirely. Higher
     specificity + !important re-asserts each class's timing over the kill rule. */
  html[data-reduced-motion="true"] .pip-in    { animation: parrotIn 0.85s cubic-bezier(0.22,1,0.36,1) both !important; }
  html[data-reduced-motion="true"] .pip-fly-l { animation: parrotFlyLeft 0.9s cubic-bezier(0.34,1.4,0.5,1) both !important; }
  html[data-reduced-motion="true"] .pip-fly-r { animation: parrotFlyRight 0.9s cubic-bezier(0.34,1.4,0.5,1) both !important; }
  html[data-reduced-motion="true"] .pip-float { animation: parrotFloat 4.5s ease-in-out infinite !important; }
  html[data-reduced-motion="true"] .pip-tilt  { animation: parrotTilt 3s ease-in-out infinite !important; }
  html[data-reduced-motion="true"] .pip-hop   { animation: parrotHop 0.7s ease !important; }
  html[data-reduced-motion="true"] .pip-drift { animation: parrotDrift 6s ease-in-out infinite !important; }
  html[data-reduced-motion="true"] .pip-surf  { animation: parrotSurf 2.8s ease-in-out infinite !important; }
  html[data-reduced-motion="true"] .pip-pop   { animation: bubblePop 0.3s cubic-bezier(0.34,1.56,0.64,1) both !important; }
  html[data-reduced-motion="true"] .pip-move  { transition: top 0.8s cubic-bezier(0.34,1.32,0.64,1), left 0.8s cubic-bezier(0.34,1.32,0.64,1) !important; }

  /* text-edit affordance for direct manipulation friendliness */
  input:focus, textarea:focus { outline: none; }
</style>

<!-- Tweak defaults -->
<script>
  // Build stamp injected by scripts/build-web.mjs. `run` is the GitHub Actions
  // run number (0 in local dev), `ts` is the build's Unix time in seconds.
  window.PAUTA_BUILD = { /*BUILD-INFO-BEGIN*/ ts: 0, run: 0 /*BUILD-INFO-END*/ };
  window.PAUTA_REPO  = "Iouzy/psychic-guide";

  window.PAUTA_CLEAN_START = true;
  window.PAUTA_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#B8533A",
    "palette": "terracotta",
    "showElapsed": true,
    "reflectionPrompts": true,
    "density": "cozy"
  }/*EDITMODE-END*/;

  // Apply the saved theme before React paints, so there's no light→dark flash.
  // Theme is mirrored to a tiny key by the app; "auto" follows the OS.
  (function () {
    try {
      var pref = localStorage.getItem("pauta.theme") || "auto";
      var dark = pref === "dark" || (pref === "auto" &&
        window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
      var root = document.documentElement;
      if (dark) root.setAttribute("data-theme", "dark");
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute("content", dark ? "#1B1A17" : "#F5F1EA");
      window.PAUTA_APPLY_THEME = function (p) {
        var d = p === "dark" || (p === "auto" &&
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (d) root.setAttribute("data-theme", "dark"); else root.removeAttribute("data-theme");
        try { localStorage.setItem("pauta.theme", p); } catch (e) {}
        if (meta) meta.setAttribute("content", d ? "#1B1A17" : "#F5F1EA");
      };
      // React to OS theme changes while in "auto".
      if (window.matchMedia) {
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () {
          var p = localStorage.getItem("pauta.theme") || "auto";
          if (p === "auto") window.PAUTA_APPLY_THEME("auto");
        });
      }
    } catch (e) {}
  })();
</script>

<!-- PWA: register service worker + capture Android install prompt -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("service-worker.js").catch(function (e) {
        console.warn("SW registration failed", e);
      });
    });
  }
  // Android/Chromium fires this; stash it so the app can offer an Install button.
  window.PAUTA_DEFERRED_INSTALL = null;
  window.addEventListener("beforeinstallprompt", function (e) {
    e.preventDefault();
    window.PAUTA_DEFERRED_INSTALL = e;
    window.dispatchEvent(new CustomEvent("pauta-installable"));
  });
  window.addEventListener("appinstalled", function () {
    window.PAUTA_DEFERRED_INSTALL = null;
    window.dispatchEvent(new CustomEvent("pauta-installed"));
  });
</script>
