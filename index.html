<style>
  :root {
    --paper: #F5F1EA;
    --paper-2: #EDE7DC;
    --paper-3: #E4DDCE;
    --ink: #1A1815;
    --ink-2: #4A453C;
    --ink-3: #8A8275;
    --ink-4: #B5AC9C;
    --rule: #D9D2C5;
    --accent: #B8533A;
    --accent-soft: #E8C3B5;
    --accent-bg: #F4E2DA;
    --good: #5A6B3E;
    /* Inverse surfaces (the focus card, primary buttons) stay dark in both themes. */
    --surface-dark: #1A1815;
    --on-dark: #F5F1EA;
    --on-dark-2: #B5AC9C;
    --tabbar-bg: rgba(245,241,234,0.92);
    --page-bg: #d6cfc2;
    --page-grad: radial-gradient(circle at 30% 20%, #e0d9cb, #c8c0b1);
    --serif: "Instrument Serif", "Times New Roman", serif;
    --sans: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: "Geist Mono", ui-monospace, monospace;
  }
  html[data-theme="dark"] {
    --paper: #1B1A17;
    --paper-2: #232220;
    --paper-3: #2C2A26;
    --ink: #ECE6DA;
    --ink-2: #C3BCAD;
    --ink-3: #8A8275;
    --ink-4: #5F5A50;
    --rule: #322F2A;
    --good: #8DA068;
    --surface-dark: #2A2824;
    --on-dark: #F2ECE0;
    --on-dark-2: #B5AC9C;
    --tabbar-bg: rgba(20,19,16,0.92);
    --page-bg: #0f0e0c;
    --page-grad: radial-gradient(circle at 30% 20%, #1a1815, #0c0b0a);
  }
  * { box-sizing: border-box; }
  /* The app is a native-feeling surface, not a web page: suppress text
     selection, the long-press selection menu and tap-highlight flashes
     app-wide. Inputs/textareas opt back IN so notes, intentions, reflections
     and habit names stay fully editable and selectable. // PT: sem seleção de
     texto na interface; só os campos de escrita permanecem selecionáveis. */
  html {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
  }
  input, textarea, [contenteditable="true"] {
    -webkit-user-select: text;
    -moz-user-select: text;
    user-select: text;
    -webkit-touch-callout: default;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--page-bg);
    font-family: var(--sans);
    color: var(--ink);
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: var(--page-grad);
  }
  #root {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .frame {
    width: 100%;
    height: 100%;
    max-width: 440px;
    max-height: 920px;
    background: var(--paper);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    border-radius: 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.05);
  }
  @media (max-width: 500px), (max-height: 700px) {
    .frame { border-radius: 0; max-width: none; max-height: none; box-shadow: none; }
  }
  .frame::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.025) 1px, transparent 0);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }
  /* iOS-style scrollbar hidden */
  .scroll::-webkit-scrollbar { display: none; }
  .scroll { scrollbar-width: none; }

  /* button reset */
  button { font: inherit; cursor: pointer; }
  input, textarea { font: inherit; }

  /* Accessibility: a visible keyboard-focus ring (only for keyboard users, via
     :focus-visible — pointer taps stay clean). Uses the live accent colour. */
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* status bar mock */
  .statusbar {
    display: flex; justify-content: space-between; align-items: center;
    /* Reserve room for the (transparent, edge-to-edge) system status bar. */
    padding: calc(14px + env(safe-area-inset-top)) 24px 0;
    font-family: var(--mono); font-size: 12px;
    color: var(--ink-2);
    position: relative; z-index: 2;
    flex-shrink: 0;
  }

  /* tap feedback */
  .tap { transition: transform 0.08s ease, opacity 0.12s; }
  .tap:active { transform: scale(0.97); opacity: 0.85; }

  /* sheet animations */
  @keyframes sheetIn {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @keyframes sheetCenterIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  /* Flex-centred entrance: for cards already centred by their flex parent (e.g.
     ConfirmHost). No translate(-50%,-50%) here — that would yank the card
     half-off-screen during the animation and snap back. Just a scale + tiny
     lift. // PT: entrada para cartões já centrados por flexbox — sem translate
     que os atirava para fora do ecrã durante a animação. */
  @keyframes cardCenterIn {
    from { opacity: 0; transform: translateY(8px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .om-sheet-card::-webkit-scrollbar { display: none; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Tab content settle — a quiet "page turn" when switching tabs. */
  @keyframes tabIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* Habit cell completion: the tide "fills in" with a short ripple + scale. */
  @keyframes tideFill {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes tideRipple {
    from { transform: scale(0.4); opacity: 0.5; }
    to   { transform: scale(2.4); opacity: 0; }
  }
  /* Empty-state starters drift in gently. */
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* Pip the parrot has NO CSS animation. ALL his motion — wing flap, bob,
     fly-across, surf, hop, head nod, blink — is driven by requestAnimationFrame
     in src/parrot.jsx, writing inline transforms straight to the DOM. CSS
     keyframes/transitions get killed by some Androids' "remove animations" /
     OS reduce-motion setting; JS-set inline transforms are not — which is the
     whole reason Pip is rebuilt this way. (His old .pip-* classes are gone.) */

  /* Honour the user's (or OS's) reduce-motion preference: kill all animation.
     The attribute is set on <html> by app.jsx from prefs.reducedMotion, which
     itself defaults from prefers-reduced-motion. */
  html[data-reduced-motion="true"] *,
  html[data-reduced-motion="true"] *::before,
  html[data-reduced-motion="true"] *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
  /* No Pip exemption is needed here: Pip uses zero CSS animation (his motion is
     all JS — see src/parrot.jsx), so the reduce-motion kill above never touches
     him. The rest of the app still honours reduce-motion. */

  /* text-edit affordance for direct manipulation friendliness */
  input:focus, textarea:focus { outline: none; }
</style>

<!-- Tweak defaults -->
<script>
  // Build stamp injected by scripts/build-web.mjs. `run` is the GitHub Actions
  // run number (0 in local dev), `ts` is the build's Unix time in seconds.
  window.PAUTA_BUILD = { /*BUILD-INFO-BEGIN*/ ts: 0, run: 0 /*BUILD-INFO-END*/ };
  window.PAUTA_REPO  = "Iouzy/psychic-guide";

  window.PAUTA_CLEAN_START = true;
  window.PAUTA_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#B8533A",
    "palette": "terracotta",
    "showElapsed": true,
    "reflectionPrompts": true,
    "density": "cozy"
  }/*EDITMODE-END*/;

  // Apply the saved theme before React paints, so there's no light→dark flash.
  // Theme is mirrored to a tiny key by the app; "auto" follows the OS.
  (function () {
    try {
      var pref = localStorage.getItem("pauta.theme") || "auto";
      var dark = pref === "dark" || (pref === "auto" &&
        window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
      var root = document.documentElement;
      if (dark) root.setAttribute("data-theme", "dark");
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute("content", dark ? "#1B1A17" : "#F5F1EA");
      window.PAUTA_APPLY_THEME = function (p) {
        var d = p === "dark" || (p === "auto" &&
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (d) root.setAttribute("data-theme", "dark"); else root.removeAttribute("data-theme");
        try { localStorage.setItem("pauta.theme", p); } catch (e) {}
        if (meta) meta.setAttribute("content", d ? "#1B1A17" : "#F5F1EA");
      };
      // React to OS theme changes while in "auto".
      if (window.matchMedia) {
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () {
          var p = localStorage.getItem("pauta.theme") || "auto";
          if (p === "auto") window.PAUTA_APPLY_THEME("auto");
        });
      }
    } catch (e) {}
  })();
</script>

<!-- PWA: register service worker + capture Android install prompt -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("service-worker.js").catch(function (e) {
        console.warn("SW registration failed", e);
      });
    });
  }
  // Android/Chromium fires this; stash it so the app can offer an Install button.
  window.PAUTA_DEFERRED_INSTALL = null;
  window.addEventListener("beforeinstallprompt", function (e) {
    e.preventDefault();
    window.PAUTA_DEFERRED_INSTALL = e;
    window.dispatchEvent(new CustomEvent("pauta-installable"));
  });
  window.addEventListener("appinstalled", function () {
    window.PAUTA_DEFERRED_INSTALL = null;
    window.dispatchEvent(new CustomEvent("pauta-installed"));
  });
</script>
