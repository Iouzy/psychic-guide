<style>
  :root {
    --paper: #F5F1EA;
    --paper-2: #EDE7DC;
    --paper-3: #E4DDCE;
    --ink: #1A1815;
    --ink-2: #4A453C;
    --ink-3: #8A8275;
    --ink-4: #B5AC9C;
    --rule: #D9D2C5;
    --accent: #B8533A;
    --accent-soft: #E8C3B5;
    --accent-bg: #F4E2DA;
    --good: #5A6B3E;
    --serif: "Instrument Serif", "Times New Roman", serif;
    --sans: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: "Geist Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #d6cfc2;
    font-family: var(--sans);
    color: var(--ink);
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: radial-gradient(circle at 30% 20%, #e0d9cb, #c8c0b1);
  }
  #root {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .frame {
    width: 100%;
    height: 100%;
    max-width: 440px;
    max-height: 920px;
    background: var(--paper);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    border-radius: 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.05);
  }
  @media (max-width: 500px), (max-height: 700px) {
    .frame { border-radius: 0; max-width: none; max-height: none; box-shadow: none; }
  }
  .frame::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.025) 1px, transparent 0);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }
  /* iOS-style scrollbar hidden */
  .scroll::-webkit-scrollbar { display: none; }
  .scroll { scrollbar-width: none; }

  /* button reset */
  button { font: inherit; cursor: pointer; }
  input, textarea { font: inherit; }

  /* status bar mock */
  .statusbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0;
    font-family: var(--mono); font-size: 12px;
    color: var(--ink-2);
    position: relative; z-index: 2;
    flex-shrink: 0;
  }

  /* tap feedback */
  .tap { transition: transform 0.08s ease, opacity 0.12s; }
  .tap:active { transform: scale(0.97); opacity: 0.85; }

  /* sheet animations */
  @keyframes sheetIn {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @keyframes sheetCenterIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  .om-sheet-card::-webkit-scrollbar { display: none; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes pulse {
