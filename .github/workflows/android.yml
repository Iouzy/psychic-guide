name: Build Android APK

# Builds an installable .apk on every push and publishes it as a rolling
# "latest" GitHub Release, so you never need Android Studio locally.
on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Assemble web bundle
        run: npm run build:web

      - name: Add Android platform
        run: npx cap add android

      - name: Inject native focus-timer plugin
        run: npm run inject:native

      - name: Generate app icon from icons/icon-512.png
        continue-on-error: true
        run: |
          mkdir -p resources
          cp icons/icon-512.png resources/icon.png
          npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Use stable debug keystore (so app updates keep your data)
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk pauta.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pauta-apk
          path: pauta.apk

      # Versioned release: immutable, one per build, with a tag that changes
      # every time (v1.0.<run>). This is the repo's "Latest" full release, so
      # update trackers like Obtainium — and GitHub's /releases/latest — detect
      # every new build automatically, with no manual per-app config. Obtainium
      # notifies the user of the update; the user chooses when to install it.
      - name: Publish versioned Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Pauta · build ${{ github.run_number }}
          body: |
            Automatically built Android APK (build ${{ github.run_number }}).
            Download pauta.apk below and install it on your phone.
          files: pauta.apk
          fail_on_unmatched_files: true
          make_latest: true

      # Rolling "latest" tag: kept for backward compatibility — older installs'
      # in-app update checker queries this tag directly. Marked as a prerelease
      # so it doesn't claim the "Latest" badge from the versioned release above.
      # The build number is advertised in the name so the in-app UpdateChecker
      # can parse it; keep the literal "build <n>" format.
      - name: Update rolling "latest" Release (for the in-app checker)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Pauta · build ${{ github.run_number }}
          body: |
            Automatically built Android APK (build ${{ github.run_number }}).
            Download pauta.apk below and install it on your phone.
          files: pauta.apk
          fail_on_unmatched_files: true
          prerelease: true
          make_latest: false
