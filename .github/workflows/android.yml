name: Build Android APK

# Builds an installable .apk on every push and publishes it as a rolling
# "latest" GitHub Release, so you never need Android Studio locally.
on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Lint/test gate — runs the same `npm run check` used locally (JSX transpile,
  # i18n EN coverage, cadence math, Vitest). A JSX syntax error fails silently
  # in the browser and would otherwise ship to the rolling release unnoticed,
  # so block the APK build on it.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run checks (JSX + i18n + cadence + Vitest)
        run: npm run check

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Assemble web bundle
        run: npm run build:web

      - name: Add Android platform
        run: npx cap add android

      - name: Inject native focus-timer plugin
        run: npm run inject:native

      - name: Generate app icon from icons/icon-512.png
        continue-on-error: true
        run: |
          mkdir -p resources
          cp icons/icon-512.png resources/icon.png
          npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Use stable debug keystore (so app updates keep your data)
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk pauta.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pauta-apk
          path: pauta.apk

      - name: Build date stamp
        id: stamp
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Publish to rolling "latest" Release
        uses: softprops/action-gh-release@v2
        with:
          # ONE rolling release, always tagged `latest` — this is exactly what
          # the in-app UpdateChecker fetches (releases/tags/latest). prerelease
          # MUST be false and make_latest true so GitHub's "Latest" badge and the
          # checker always agree on the same release; without this a stale
          # pre-release once held the `latest` tag while a different release wore
          # the badge. The checker compares the APK asset's upload time against
          # the build's timestamp (not a parsed number), so the name/body only
          # need to be human-friendly — we show the date, which always moves
          # forward (the old run-number could reset and go backwards).
          tag_name: latest
          prerelease: false
          make_latest: true
          name: Pauta · ${{ steps.stamp.outputs.date }}
          body: |
            Automatically built Android APK (${{ steps.stamp.outputs.date }}).
            Download pauta.apk below and install it on your phone.
          files: pauta.apk
          fail_on_unmatched_files: true
