name: Build Android APK

# Builds an installable .apk on every push (so feature branches validate that
# the APK still assembles), but ONLY the `main` branch publishes the rolling
# "latest" GitHub Release that the in-app updater pulls. This stops a push to
# any other branch from overwriting the release your phone updates from — and
# the reset-proof epoch versionCode means a stray branch build could otherwise
# look "newer" and silently downgrade installed users.
on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Lint/test gate — runs the same `npm run check` used locally (JSX transpile,
  # i18n EN coverage, cadence math, Vitest). A JSX syntax error fails silently
  # in the browser and would otherwise ship to the rolling release unnoticed,
  # so block the APK build on it.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run checks (JSX + i18n + cadence + Vitest)
        run: npm run check

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Assemble web bundle
        run: npm run build:web

      - name: Add Android platform
        run: npx cap add android

      - name: Inject native focus-timer plugin
        run: npm run inject:native

      - name: Generate app icon from icons/icon-512.png
        continue-on-error: true
        run: |
          mkdir -p resources
          cp icons/icon-512.png resources/icon.png
          npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Use stable debug keystore (so app updates keep your data)
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Stage APK
        # Version the filename (pauta-v<run>.apk) so each download lands as a
        # DISTINCT file in the phone's Downloads folder instead of colliding on
        # "pauta.apk" and being renamed pauta(1).apk, pauta(2).apk … The in-app
        # updater matches any *.apk asset (not a fixed name), so this is safe.
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "pauta-v${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pauta-apk
          path: pauta-v${{ github.run_number }}.apk

      - name: Move the rolling `latest` tag to this commit
        # Without this the `latest` git tag stays pinned to wherever it was first
        # created (an ancient commit), so the Release page forever shows that old
        # SHA and a stale "Pauta N" name even though the APK asset is replaced each
        # build — which looks like nothing ever ships. Force-move the tag to HEAD
        # so the Release reflects the actual build commit. main-only (same gate as
        # the publish below); contents:write + the checkout token allow the push.
        if: github.ref == 'refs/heads/main'
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Publish to rolling "latest" Release
        # Only main owns the release the in-app updater fetches; branch pushes
        # still build + upload the artifact above, but never touch `latest`.
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          # ONE rolling release, always tagged `latest` — this is exactly what
          # the in-app UpdateChecker fetches (releases/tags/latest). prerelease
          # MUST be false and make_latest true so GitHub's "Latest" badge and the
          # checker always agree on the same release; without this a stale
          # pre-release once held the `latest` tag while a different release wore
          # the badge. The checker compares the APK asset's upload time against
          # the build's timestamp (not a parsed number), so the name uses the
          # run_number (already stamped into the APK) as a human-friendly counter
          # that always moves forward. target_commitish pins the release to THIS
          # build's commit so the page stops showing the stale tag SHA.
          tag_name: latest
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: true
          name: Pauta ${{ github.run_number }}
          body: |
            Build ${{ github.run_number }} — automatically assembled Android APK.
            Download pauta-v${{ github.run_number }}.apk below and install it on your phone.
          files: pauta-v${{ github.run_number }}.apk
          fail_on_unmatched_files: true
